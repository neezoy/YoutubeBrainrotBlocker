<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Youtube Brainrot Blocker</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px 14px;
      border-bottom: 1px solid #272727;
    }

    .header-icon {
      width: 28px;
      height: 28px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.01em;
    }

    .toggles {
      padding: 8px 0;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 18px;
      gap: 12px;
      transition: background 0.15s;
    }

    .toggle-row:hover {
      background: #1a1a1a;
    }

    .toggle-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
    }

    .toggle-title {
      font-size: 13.5px;
      font-weight: 500;
      color: #e8e8e8;
    }

    .toggle-desc {
      font-size: 11.5px;
      color: #888;
      line-height: 1.4;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #3a3a3a;
      border-radius: 22px;
      transition: background 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: #888;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    input:checked + .slider {
      background: #cc0000;
    }

    input:checked + .slider::before {
      transform: translateX(18px);
      background: #fff;
    }

    .footer {
      padding: 10px 18px 14px;
      border-top: 1px solid #1e1e1e;
      font-size: 11px;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <img class="header-icon" src="icons/icon.png" alt="">
    <span class="header-title">Brainrot Blocker</span>
  </div>

  <div class="toggles">
    <div class="toggle-row">
      <div class="toggle-info">
        <span class="toggle-title">Block Shorts</span>
        <span class="toggle-desc">Hide Shorts from all pages and redirect /shorts URLs</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="blockShorts">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <div class="toggle-info">
        <span class="toggle-title">Hide Recommended</span>
        <span class="toggle-desc">Remove the "Up Next" sidebar on video pages</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="hideRecommended">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <div class="toggle-info">
        <span class="toggle-title">Redirect Home</span>
        <span class="toggle-desc">Redirect home to Subscriptions and hide the home feed</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="redirectHome">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="footer">Toggle changes apply on the next page navigation</div>

  <script src="popup.js"></script>
</body>
</html>
